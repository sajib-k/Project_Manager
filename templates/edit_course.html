<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Edit Course</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="dashboard">

<div class="container">
<div class="sidebar">

    <h3>📚 Course Resource Manager</h3>

    <a href="/home">🏠 Dashboard</a>
    <a href="/logout">🚪 Logout</a>

</div>

<div class="main">

    <div class="topbar">
        <h2>Edit Course</h2>
    </div>

    <div class="card">

        <form method="POST">

            <div class="form-group">

                <label>Course Name</label>

                <input
                    type="text"
                    name="course_name"
                    value="{{ course[0] }}"
                    required>

            </div>

            <div class="form-group">

                <label>Semester</label>

                <input
                    type="text"
                    name="semester"
                    value="{{ course[1] }}"
                    required>

            </div>

            <div class="form-buttons">

                <button
                    type="submit"
                    class="add-btn">
                    Save Changes
                </button>

                <button
                    type="button"
                    class="cancel-btn"
                    onclick="location.href='/home'">
                    Cancel
                </button>

            </div>

        </form>

    </div>

</div>

</div>

</body>
</html>
