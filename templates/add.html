```html
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add Course - Course Resource Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="dashboard">

    <div class="container">

        <!-- Sidebar -->
        <div class="sidebar">

            <h3>📚 Course Resource Manager</h3>

            <a href="/home">🏠 Dashboard</a>

            <a href="/home" class="active">📚 Courses</a>

            <a href="#">📁 Resources</a>

            <a href="#">⬆️ Upload Resource</a>

            <a href="#">🔍 Search Resources</a>

            <a href="#">📝 Notes</a>

            <a href="#">⭐ Favorites</a>

            <a href="#">🗑️ Trash</a>

            <hr style="border:1px solid #334155; margin:20px 0;">

            <a href="#">⚙️ Settings</a>

            <a href="/logout">🚪 Logout</a>

        </div>

        <!-- Main Content -->
        <div class="main">

            <div class="topbar">
                <h2>Add New Course</h2>
            </div>

            <div class="card">

                <form method="POST">

                    <div class="form-group">

                        <label for="course_name">
                            Course Name
                        </label>

                        <input
                            type="text"
                            id="course_name"
                            name="course_name"
                            placeholder="e.g. Cyber Security"
                            required>

                    </div>

                    <div class="form-group">

                        <label for="semester">
                            Semester
                        </label>

                        <input
                            type="text"
                            id="semester"
                            name="semester"
                            placeholder="e.g. 3rd Semester"
                            required>

                    </div>

                    <div class="form-buttons">

                        <button
                            type="submit"
                            class="add-btn">
                            Add Course
                        </button>

                        <button
                            type="button"
                            class="cancel-btn"
                            onclick="location.href='/home'">
                            Cancel
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
```
