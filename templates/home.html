<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home - Project Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="dashboard">

<div class="container">
    <div class="sidebar">
        <h3>📋 Project Manager</h3>

        <a href="/home">🏠 Home</a>
        <a href="/add">➕ Add Project</a>
        <a href="/logout">🚪 Logout</a>
    </div>

    <div class="main">
        <div class="topbar">
            <h2>My Projects</h2>
            <button class="add-btn" onclick="location.href='/add'">+ Add Project</button>
        </div>

        <div class="projects-container">
            {% if projects %}
                {% for project in projects %}
<div class="card">

    {% if project[5] %}
    <img src="{{ project[5] }}" alt="Project Image" class="project-image">
    {% endif %}

    <h3>{{ project[2] }}</h3>

    <p>{{ project[3] }}</p>

    {% if project[4] %}
    <a href="{{ project[4] }}" target="_blank" class="project-link">
        🔗 Open Project
    </a>
    {% endif %}

    <div class="card-buttons">
        <button class="edit-btn">Edit</button>

        <button class="delete-btn"
            onclick="location.href='/delete/{{ project[0] }}'">
            Delete
        </button>
    </div>

</div>
                {% endfor %}
            {% else %}
                <p class="no-projects">No projects yet. <a href="/add">Create one!</a></p>
            {% endif %}
        </div>
    </div>
</div>

</body>
</html>
