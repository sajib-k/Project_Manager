<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="dashboard">

<div class="container">

```
<div class="sidebar">
    <h3>🎓 Course Manager</h3>

    <a href="/home">🏠 Dashboard</a>
    <a href="/add">➕ Add Course</a>
    <a href="/logout">🚪 Logout</a>
</div>

<div class="main">

    <div class="topbar">
        <h2>My Courses</h2>

        <button
            class="add-btn"
            onclick="location.href='/add'">
            + Add Course
        </button>
    </div>

    <div class="projects-container">

        {% if courses %}

            {% for course in courses %}

            <div class="card">

                <h3>
                    📚 {{ course[2] }}
                </h3>

                <p>
                    Semester: {{ course[3] }}
                </p>

                <div class="card-buttons">

<button
    class="edit-btn"
    onclick="location.href='/resources/{{ course[0] }}'">
    View Resources
</button>

<button
    class="add-btn"
    onclick="location.href='/add_resource/{{ course[0] }}'">
    Add Resource
</button>

                    <button
                        class="delete-btn"
                        onclick="location.href='/delete/{{ course[0] }}'">
                        Delete
                    </button>

                </div>

            </div>

            {% endfor %}

        {% else %}

            <p class="no-projects">
                No courses yet.
                <a href="/add">
                    Create one!
                </a>
            </p>

        {% endif %}

    </div>

</div>

</div>

</body>
</html>
