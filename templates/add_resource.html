<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add Resource</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="dashboard">

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">

        <h3>📚 Course Resource Manager</h3>

        <a href="/home">🏠 Dashboard</a>

        <a href="/home">📚 Courses</a>

        <a href="#" class="active">📁 Resources</a>

        <a href="#">⬆️ Upload Resource</a>

        <a href="#">🔍 Search Resources</a>

        <a href="#">📝 Notes</a>

        <a href="#">⭐ Favorites</a>

        <a href="#">🗑️ Trash</a>

        <hr style="border:1px solid #334155; margin:20px 0;">

        <a href="#">⚙️ Settings</a>

        <a href="/logout">🚪 Logout</a>

    </div>

    <!-- Main Content -->
    <div class="main">

        <div class="topbar">
            <h2>Add Resource</h2>
        </div>

        <div class="card">

            <form method="POST">

                <div class="form-group">
                    <label for="title">Resource Title</label>

                    <input
                        type="text"
                        id="title"
                        name="title"
                        placeholder="Enter resource title"
                        required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>

                    <textarea
                        id="description"
                        name="description"
                        rows="4"
                        placeholder="Enter resource description"></textarea>
                </div>

                <div class="form-group">
                    <label for="resource_type">Resource Type</label>

                    <select
                        id="resource_type"
                        name="resource_type">

                        <option value="YouTube">YouTube</option>
                        <option value="PDF">PDF</option>
                        <option value="Link">Link</option>

                    </select>
                </div>

                <div class="form-group">
                    <label for="resource_link">Resource Link</label>

                    <input
                        type="url"
                        id="resource_link"
                        name="resource_link"
                        placeholder="https://..."
                        required>
                </div>

                <div class="form-buttons">

                    <button
                        type="submit"
                        class="add-btn">
                        Add Resource
                    </button>

                    <button
                        type="button"
                        class="cancel-btn"
                        onclick="history.back()">
                        Cancel
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
